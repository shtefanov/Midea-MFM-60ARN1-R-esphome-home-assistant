esphome:
  name: midea-air
  friendly_name: Midea AIR

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: DEBUG

api:
  encryption:
    key: !secret midea_air_api_key

ota:
  - platform: esphome
    password: !secret midea_air_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Midea-Air Fallback Hotspot"
    password: !secret midea_air_fallback_password

captive_portal:

# Midea CN700 UART through a 5V <-> 3.3V level shifter
# GPIO17 ESP32 TX -> air conditioner CN700 RX
# GPIO16 ESP32 RX <- air conditioner CN700 TX
uart:
  id: uart_midea
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 9600

# DS18B20 on GPIO23 / D23
# DATA -> GPIO23, 4.7 kOhm pull-up between DATA and 3V3
one_wire:
  - platform: gpio
    pin: GPIO23

climate:
  - platform: midea
    id: midea_ac
    name: "Midea AIR"
    uart_id: uart_midea

    period: 1s
    timeout: 2s
    num_attempts: 3
    autoconf: true
    beeper: false

    visual:
      min_temperature: 17
      max_temperature: 30
      temperature_step: 1

    supported_modes:
      - FAN_ONLY
      - HEAT_COOL
      - COOL
      - HEAT
      - DRY

    supported_swing_modes:
      - VERTICAL
      - HORIZONTAL
      - BOTH
    # If your unit does not report a real outdoor temperature and always shows 120°C,
    # remove this block.
    outdoor_temperature:
      name: "Midea AIR Outdoor Temperature"

button:
  - platform: restart
    name: "Midea AIR Restart ESP"

  - platform: template
    name: "Midea AIR Display Toggle"
    icon: mdi:theme-light-dark
    on_press:
      - midea_ac.display_toggle:

  - platform: template
    name: "Midea AIR Power Toggle"
    icon: mdi:power
    on_press:
      - midea_ac.power_toggle:

switch:
  - platform: template
    name: "Midea AIR Beeper"
    icon: mdi:volume-source
    optimistic: true
    turn_on_action:
      - midea_ac.beeper_on:
    turn_off_action:
      - midea_ac.beeper_off:

sensor:
  - platform: wifi_signal
    name: "Midea AIR WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Midea AIR Uptime"

  - platform: dallas_temp
    # Replace with your sensor address or remove the address line for auto-discovery.
    address: 0xa000000035f59628
    name: "Midea AIR DS18B20 Temperature"
    update_interval: 30s
    resolution: 12
    filters:
      - median:
          window_size: 5
          send_every: 2
          send_first_at: 1

binary_sensor:
  - platform: status
    name: "Midea AIR ESP Status"
