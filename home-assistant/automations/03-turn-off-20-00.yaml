alias: Midea AIR - turn off at 20:00
description: Turns the air conditioner off at 20:00 if it is on and has been running for more than 1 minute
mode: single

triggers:
  - trigger: time
    at: "20:00:00"

conditions:
  - condition: template
    value_template: >
      {{ states('climate.midea_air_midea_air') not in ['off', 'unavailable', 'unknown'] }}

  - condition: template
    value_template: >
      {{ (as_timestamp(now()) - as_timestamp(states.climate.midea_air_midea_air.last_changed)) > 60 }}

actions:
  - action: climate.turn_off
    target:
      entity_id: climate.midea_air_midea_air
