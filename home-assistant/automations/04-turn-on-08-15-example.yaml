alias: Midea AIR - turn on at 08:15 example
description: >
  Example 08:15 start: only if the air conditioner has been off for more than 3 minutes
  and temperature is above 22°C. Replace entity IDs with your own system entities.
mode: single

triggers:
  - trigger: time
    at: "08:15:00"

conditions:
  # Example: replace with your own condition, such as "hall is open" or "light is on".
  # - condition: state
  #   entity_id: light.your_hall_light
  #   state: "on"

  - condition: numeric_state
    entity_id: sensor.your_room_temperature
    above: 22

  - condition: state
    entity_id: climate.midea_air_midea_air
    state: "off"
    for:
      hours: 0
      minutes: 3
      seconds: 0

actions:
  - action: button.press
    target:
      entity_id: button.midea_air_midea_air_power_toggle

  - delay: "00:00:03"

  - action: climate.set_temperature
    target:
      entity_id: climate.midea_air_midea_air
    data:
      temperature: 22
      hvac_mode: cool

  - action: climate.set_fan_mode
    target:
      entity_id: climate.midea_air_midea_air
    data:
      fan_mode: auto

  - delay: "00:00:30"

  - action: climate.set_swing_mode
    target:
      entity_id: climate.midea_air_midea_air
    data:
      swing_mode: horizontal
